<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - ConnectHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #0f0f1a;
      --bg-card: rgba(30, 30, 50, 0.7);
      --bg-input: rgba(255, 255, 255, 0.06);
      --text-primary: #e4e6eb;
      --text-secondary: #b0b3b8;
      --text-tertiary: #6b7280;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --accent-glow: rgba(99, 102, 241, 0.35);
      --danger: #f02849;
      --success: #31a24c;
      --border: rgba(255, 255, 255, 0.08);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-primary);
      color: var(--text-primary);
      overflow: hidden;
      position: relative;
    }

    /* ===== 动态背景 ===== */
    .bg-animation {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    .bg-animation .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.4;
      animation: float 20s ease-in-out infinite;
    }

    .orb:nth-child(1) {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #6366f1, transparent 70%);
      top: -10%; left: -5%;
      animation-duration: 22s;
    }

    .orb:nth-child(2) {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #a855f7, transparent 70%);
      bottom: -15%; right: -10%;
      animation-duration: 18s;
      animation-delay: -5s;
    }

    .orb:nth-child(3) {
      width: 300px; height: 300px;
      background: radial-gradient(circle, #ec4899, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      animation-duration: 25s;
      animation-delay: -10s;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(40px, -30px) scale(1.05); }
      50% { transform: translate(-20px, 40px) scale(0.95); }
      75% { transform: translate(30px, 20px) scale(1.02); }
    }

    /* ===== 登录容器 ===== */
    .login-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      padding: 16px;
    }

    .login-card {
      background: var(--bg-card);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 40px;
      box-shadow:
        0 24px 80px rgba(0, 0, 0, 0.5),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
      animation: cardIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(30px) scale(0.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ===== Logo ===== */
    .login-logo {
      text-align: center;
      margin-bottom: 36px;
    }

    .login-logo .icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 64px;
      height: 64px;
      border-radius: 20px;
      background: linear-gradient(135deg, var(--accent), #a855f7);
      font-size: 28px;
      color: #fff;
      margin-bottom: 16px;
      box-shadow: 0 8px 32px var(--accent-glow);
    }

    .login-logo h1 {
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), #a855f7, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    .login-logo p {
      color: var(--text-tertiary);
      font-size: 14px;
      margin-top: 6px;
    }

    /* ===== 表单 ===== */
    .form-group {
      margin-bottom: 20px;
      position: relative;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 8px;
      letter-spacing: 0.3px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper i {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-tertiary);
      font-size: 15px;
      transition: color 0.2s;
    }

    .input-wrapper input {
      width: 100%;
      padding: 14px 16px 14px 46px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text-primary);
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: all 0.25s ease;
    }

    .input-wrapper input:focus {
      border-color: var(--accent);
      background: rgba(99, 102, 241, 0.06);
      box-shadow: 0 0 0 4px var(--accent-glow);
    }

    .input-wrapper input:focus + i,
    .input-wrapper input:focus ~ i {
      color: var(--accent);
    }

    .input-wrapper input::placeholder { color: var(--text-tertiary); }

    .toggle-password {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-tertiary);
      cursor: pointer;
      font-size: 15px;
      padding: 4px;
      transition: color 0.2s;
    }

    .toggle-password:hover { color: var(--text-primary); }

    /* ===== 辅助链接 ===== */
    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      font-size: 13px;
    }

    .remember-me {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      color: var(--text-secondary);
    }

    .remember-me input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .forgot-link {
      color: var(--accent);
      font-weight: 500;
    }

    .forgot-link:hover { color: var(--accent-hover); text-decoration: underline; }

    /* ===== 按钮 ===== */
    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px var(--accent-glow);
    }

    .btn-login:active { transform: translateY(0); }

    .btn-login.loading {
      pointer-events: none;
      opacity: 0.8;
    }

    .btn-login .spinner {
      display: none;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin: 0 auto;
    }

    .btn-login.loading .btn-text { display: none; }
    .btn-login.loading .spinner { display: block; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== 分隔线 ===== */
    .divider-text {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 24px 0;
      font-size: 13px;
      color: var(--text-tertiary);
    }

    .divider-text::before,
    .divider-text::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ===== 社交登录 ===== */
    .social-buttons {
      display: flex;
      gap: 12px;
    }

    .btn-social {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-social:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.15);
      transform: translateY(-1px);
    }

    .btn-social i { font-size: 18px; }
    .btn-social.wechat i { color: #07c160; }
    .btn-social.github i { color: #e4e6eb; }
    .btn-social.google i { color: #ea4335; }

    /* ===== 注册链接 ===== */
    .signup-link {
      text-align: center;
      margin-top: 24px;
      font-size: 14px;
      color: var(--text-tertiary);
    }

    .signup-link a {
      color: var(--accent);
      font-weight: 600;
    }

    .signup-link a:hover { color: var(--accent-hover); text-decoration: underline; }

    /* ===== 错误提示 ===== */
    .error-msg {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      background: rgba(240, 40, 73, 0.1);
      border: 1px solid rgba(240, 40, 73, 0.2);
      border-radius: 10px;
      color: var(--danger);
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 16px;
      animation: shake 0.4s ease;
    }

    .error-msg.show { display: flex; }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }

    /* ===== 成功提示 ===== */
    .success-msg {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      background: rgba(49, 162, 76, 0.1);
      border: 1px solid rgba(49, 162, 76, 0.2);
      border-radius: 10px;
      color: var(--success);
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 16px;
    }

    .success-msg.show { display: flex; }

    /* ===== Demo 提示 ===== */
    .demo-hint {
      margin-top: 20px;
      padding: 14px;
      background: rgba(99, 102, 241, 0.06);
      border: 1px solid rgba(99, 102, 241, 0.15);
      border-radius: 10px;
      font-size: 12px;
      color: var(--text-tertiary);
      line-height: 1.7;
    }

    .demo-hint strong { color: var(--accent); }

    /* ===== 响应式 ===== */
    @media (max-width: 480px) {
      .login-card { padding: 36px 24px; border-radius: 20px; }
      .login-logo h1 { font-size: 24px; }
      .social-buttons { flex-direction: column; }
    }
  </style>
</head>
<body>

  <!-- 动态背景 -->
  <div class="bg-animation">
    <div class="orb"></div>
    <div class="orb"></div>
    <div class="orb"></div>
  </div>

  <!-- 登录卡片 -->
  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-logo">
        <div class="icon"><i class="fas fa-globe"></i></div>
        <h1>ConnectHub</h1>
        <p>登录你的社交世界</p>
      </div>

      <div class="error-msg" id="errorMsg">
        <i class="fas fa-circle-exclamation"></i>
        <span id="errorText">用户名或密码错误</span>
      </div>

      <div class="success-msg" id="successMsg">
        <i class="fas fa-circle-check"></i>
        <span id="successText">登录成功！正在跳转...</span>
      </div>

      <form id="loginForm" autocomplete="off">
        <div class="form-group">
          <label for="username">用户名</label>
          <div class="input-wrapper">
            <input type="text" id="username" name="username" placeholder="请输入用户名" required>
            <i class="fas fa-user"></i>
          </div>
        </div>

        <div class="form-group">
          <label for="password">密码</label>
          <div class="input-wrapper">
            <input type="password" id="password" name="password" placeholder="请输入密码" required>
            <i class="fas fa-lock"></i>
            <button type="button" class="toggle-password" id="togglePwd">
              <i class="far fa-eye"></i>
            </button>
          </div>
        </div>

        <div class="form-options">
          <label class="remember-me">
            <input type="checkbox" checked> 记住我
          </label>
          <a href="#" class="forgot-link">忘记密码？</a>
        </div>

        <button type="submit" class="btn-login" id="btnLogin">
          <span class="btn-text">登 录</span>
          <div class="spinner"></div>
        </button>
      </form>

      <div class="divider-text">或使用以下方式登录</div>

      <div class="social-buttons">
        <button class="btn-social wechat"><i class="fab fa-weixin"></i>微信</button>
        <button class="btn-social github"><i class="fab fa-github"></i>GitHub</button>
        <button class="btn-social google"><i class="fab fa-google"></i>Google</button>
      </div>

      <div class="signup-link">
        还没有账号？<a href="#">立即注册</a>
      </div>

      <div class="demo-hint">
        <strong>🔑 演示账号：</strong><br>
        用户名：<strong>admin</strong> &nbsp; 密码：<strong>123456</strong><br>
        登录成功后服务器会通过 <strong>Set-Cookie</strong> 响应头设置 Cookie，可通过 Burp Suite / Wireshark / F12 抓包查看。
      </div>
    </div>
  </div>

  <script>
    // 密码可见切换
    document.getElementById('togglePwd').addEventListener('click', function () {
      const pwdInput = document.getElementById('password');
      const icon = this.querySelector('i');
      if (pwdInput.type === 'password') {
        pwdInput.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
      } else {
        pwdInput.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
      }
    });

    // 登录表单提交
    document.getElementById('loginForm').addEventListener('submit', async function (e) {
      e.preventDefault();

      const btn = document.getElementById('btnLogin');
      const errorMsg = document.getElementById('errorMsg');
      const successMsg = document.getElementById('successMsg');
      const errorText = document.getElementById('errorText');

      // 隐藏之前的提示
      errorMsg.classList.remove('show');
      successMsg.classList.remove('show');

      // 按钮 loading
      btn.classList.add('loading');

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
          credentials: 'same-origin' // 确保 cookie 被接收
        });

        const data = await res.json();

        if (res.ok && data.success) {
          successMsg.classList.add('show');
          document.getElementById('successText').textContent =
            `登录成功！欢迎回来，${data.user.nickname}。正在跳转...`;

          // 2 秒后跳转到首页
          setTimeout(() => {
            window.location.href = '/index.html';
          }, 2000);
        } else {
          errorText.textContent = data.message || '用户名或密码错误';
          errorMsg.classList.add('show');
        }
      } catch (err) {
        errorText.textContent = '网络请求失败，请确认服务器已启动 (node server.js)';
        errorMsg.classList.add('show');
      } finally {
        btn.classList.remove('loading');
      }
    });
  </script>

</body>
</html>
